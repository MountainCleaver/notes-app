<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notes App</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">

</head>

<body>

    <header>
        <h1 class="h1">notes app</h1>
    </header>

    <main>
        <button id="btn-add-note" class="px-3 py-1 ">+ Add Note</button>

        <div id="notes-main-container">
            <div id="notes-list-container">
                <ul id="notes-list-items">
                </ul>
            </div>
            <div id="notes-content-container">
                <div id="note-header">
                    <h5 id="note-title">Title</h5>
                    <div id="note-actions">
                    </div>
                </div>
                <p id="note-date" class="fw-light">Some date</p>
                <p id="note-content">Lorem ipsum dolor sit amet consectetur adipisicing elit. Enim numquam praesentium
                    consectetur eaque quasi et, labore laudantium blanditiis tenetur neque quibusdam corrupti natus
                    incidunt iste suscipit quia sed nam fugit!</p>


            </div>
        </div>

        <!-- MODAL  START-->
        <div class="hidden" id="modal-add-note">
            <div class="modal-container">
                <div class="title-field">
                    <label for="note-title">Title</label>
                    <input type="text" name="note-title" id="input-note-title">
                </div>
                <div class="content-field">
                    <label for="input-note-content">Content</label>
                    <textarea name="input-note-content" id="input-note-content"></textarea>
                </div>
                <div class="buttons-field">
                    <button id="btn-modal-cancel">Cancel</button>
                    <button id="btn-modal-submit">Submit</button>
                </div>
            </div>
        </div>
        <!-- MODAL  END-->

    </main>

    <footer>

    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
    <script src="script.js"></script>
</body>

</html>
